<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARIS_SPHERE // PulseFeed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-accent: #6b21a8; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-950 text-gray-200">

    <header class="border-b border-gray-800 bg-gray-900/80 sticky top-0 z-50">
        <div class="max-w-2xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold font-mono tracking-tighter">VARIS_SPHERE</h1>
            
            <div id="auth-controls">
                <button onclick="window.toggleAuthModal()" id="login-btn" 
                        class="text-xs border px-3 py-1 rounded font-mono hover:bg-gray-800 transition">
                    LOG IN / SIGN UP
                </button>
                
                <img id="user-avatar" onclick="window.showProfile()" 
                     class="hidden w-8 h-8 rounded-full border border-gray-700 cursor-pointer hover:border-white transition" 
                     src="default-avatar.png" alt="Profile">
            </div>
        </div>
    </header>

    <main id="app-container" class="max-w-2xl mx-auto p-4">
        
        <div id="feed-view">
            <p class="text-gray-500 font-mono text-sm">AWAITING_AUTHENTICATION_STREAM...</p>
        </div>

        <div id="profile-editor" class="hidden space-y-4 border border-gray-800 p-4 rounded">
            <h2 class="font-mono font-bold">EDIT_PROFILE</h2>
            <input type="file" id="avatar-upload" class="text-sm">
            <textarea id="bio-input" placeholder="BIO_DATA" class="w-full bg-black border border-gray-700 p-2 text-sm font-mono"></textarea>
            <button onclick="window.saveProfile()" class="bg-white text-black px-4 py-1 font-mono font-bold">UPDATE_NODE</button>
        </div>
    </main>

    <div id="auth-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-gray-900 p-6 border border-gray-700 rounded w-80">
            <h2 id="modal-title" class="text-lg font-bold font-mono mb-4 text-white">WELCOME TO VARIS SPHERE</h2>
            <div id="onboarding-fields" class="space-y-2 mb-4"></div>
            <button onclick="window.handleAuthSubmit()" class="w-full bg-white text-black font-bold py-2 font-mono">CONTINUE</button>
        </div>
    </div>

    <script src="main.js" defer></script>
</body>
</html>
