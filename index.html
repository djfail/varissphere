<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VarisSphere | PulseFeed</title>
    <!-- Tailwind CSS for sleek look -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0d0e12; color: #e2e8f0; font-family: system-ui, sans-serif; }
        .feed-card { background: rgb(23 25 35 / 70%); backdrop-filter: blur(12px); border: 1px solid rgb(45 55 72 / 40%); }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header -->
    <header class="border-b border-gray-800 bg-gray-900/80 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-2xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider text-purple-400 font-mono">VARIS_SPHERE // PulseFeed</h1>
            <span class="text-xs bg-purple-900/50 text-purple-300 border border-purple-500/30 px-2 py-1 rounded font-mono">NETWORK_ONLINE</span>
        </div>
    </header>

    <!-- Main Feed Container -->
    <main class="max-w-2xl mx-auto px-4 py-6 space-y-6" id="feed-container">
        <!-- Loading Placeholder -->
        <div id="loading" class="text-center text-gray-500 font-mono text-sm py-12">CONNECTING TO HOUSE QUANTUM NODE...</div>
    </main>

    <!-- Connect our brain script -->
    <script src="app.js"></script>
</body>
</html>
