<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARIS_SPHERE // PulseFeed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-accent: #6b21a8; }
        .accent-border { border-color: var(--primary-accent); }
        .accent-text { color: var(--primary-accent); }
    </style>
</head>
<body class="bg-gray-950 text-gray-200">
    <header class="border-b border-gray-800 bg-gray-900/80 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-2xl mx-auto px-4 py-3 flex justify-between items-center">
            <img src="logo.png" alt="Logo" class="h-10 w-auto mix-blend-screen">
            <button onclick="window.toggleAuthModal()" id="login-btn" class="text-xs border px-3 py-1 rounded font-mono hover:bg-gray-800 transition">CONNECT_NODE</button>
        </div>
    </header>

    <div id="auth-modal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
        <div class="bg-gray-900 border p-6 rounded-lg w-full max-w-sm">
            <h2 id="modal-title" class="text-lg font-bold font-mono mb-4">IDENTITY_VERIFICATION</h2>
            <div class="space-y-3">
                <input type="text" id="auth-username" placeholder="HANDLE" class="w-full bg-black border p-2 text-sm font-mono">
                <input type="password" id="auth-password" placeholder="ACCESS_KEY" class="w-full bg-black border p-2 text-sm font-mono">
                
                <div id="onboarding-fields" class="hidden space-y-3">
                    <input type="text" id="auth-first" placeholder="FIRST_NAME" class="w-full bg-black border p-2 text-sm font-mono">
                    <input type="text" id="auth-last" placeholder="LAST_NAME" class="w-full bg-black border p-2 text-sm font-mono">
                    <select id="auth-house" class="w-full bg-black border p-2 text-sm font-mono">
                        <option value="">SELECT_HOUSE</option>
                        <option value="Celestial House Balance">Celestial House Balance</option>
                        <option value="House Niros">House Niros</option>
                        <option value="House Iorke">House Iorke</option>
                        <option value="House Thorngrave">House Thorngrave</option>
                        <option value="Celestial House Vantal">Celestial House Vantal</option>
                        <option value="House Varis">House Varis</option>
                        <option value="House Dreyser">House Dreyser</option>
                        <option value="Celestial House Auradrakon">Celestial House Auradrakon</option>
                        <option value="House Kraxin">House Kraxin</option>
                        <option value="House Pardon">House Pardon</option>
                        <option value="Celestial House Materferox">Celestial House Materferox</option>
                        <option value="House Ashgrip">House Ashgrip</option>
                        <option value="House Glass">House Glass</option>
                        <option value="The House of R">The House of R</option>
                    </select>
                </div>
            </div>
            <button onclick="window.handleAuthSubmit()" class="w-full mt-6 bg-purple-900 py-2 font-mono">INITIALIZE</button>
            <button onclick="window.toggleAuthView()" class="w-full mt-2 text-[10px] text-gray-500 font-mono">SWITCH_MODE</button>
        </div>
    </div>
    <script src="app.js" defer></script>
</body>
</html>
