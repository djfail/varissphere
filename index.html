<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARIS_SPHERE</title>
    <!-- CSS Variables for House-based Themes -->
    <style>
        :root {
            --primary-color: #000000;
            --secondary-color: #ffffff;
        }
        body { background-color: var(--secondary-color); color: var(--primary-color); }
        .app-container { display: flex; height: 100vh; }
    </style>
</head>
<body>

    <div id="root" class="app-container">
        <!-- COLUMN 1: Navigation -->
        <nav id="nav-col" class="sidebar">
            <h1>VARIS_SPHERE</h1>
            <ul id="menu-items">
                <li>Create Pulse</li>
                <li>My Crews</li>
                <li>Direct Messages</li>
            </ul>
        </nav>

        <!-- COLUMN 2: The Pulse Feed -->
        <main id="feed-col" class="feed">
            <div id="pulse-feed">
                <!-- Content injected here via PulseFeed.jsx -->
            </div>
        </main>

        <!-- COLUMN 3: Friends List -->
        <aside id="friends-col" class="friends">
            <h2>Friends</h2>
            <div id="friends-list"></div>
        </aside>
    </div>

    <!-- Script to initialize the application logic -->
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
